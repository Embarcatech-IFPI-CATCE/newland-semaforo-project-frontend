server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # O PULO DO GATO: Se não achar o ficheiro, manda para o index.html e deixa o React Router resolver!
        try_files $uri $uri/ /index.html;
    }

    # Cache de imagens, CSS e JS para a página carregar a voar!
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}